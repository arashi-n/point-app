<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>お小遣いポイント管理</title>
	</head>
	<body>
		<h1>お小遣いポイント</h1>
		<a href="settings.html">設定画面へ</a>

		<select id="childSelect" onchange="changeChild()">
			<option value="yamato">やまと</option>
			<option value="ayato">あやと</option>
			<option value="arashi">あらし</option>
		</select>

		<p>現在ポイント：<span id="point">0</span>pt</p>
		<p>累計ポイント：<span id="totalPoint">0</span>pt</p>

		<input type="number" id="payAmount" placeholder="支給ポイント" />
		<button onclick="payPoint()">支給</button>

		<div id="itemButtons"></div>

		<button onclick="resetPoint()">ポイントリセット</button>

		<h3>履歴</h3>

		<ul id="history">
			<li>まだ履歴はありません</li>
		</ul>
		<script src="js/main.js"></script>
	</body>
</html>
