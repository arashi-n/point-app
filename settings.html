<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>設定画面</title>
		<link rel="stylesheet" href="css/style.css" />
	</head>
	<body>
		<h1>設定画面</h1>

		<a href="index.html">← メイン画面へ戻る</a>

		<hr />

		<h2>項目追加</h2>

		<p style="font-size: 12px">※ポイントは半角数字で入力してください</p>
		<input type="text" id="itemName" placeholder="項目名（例：宿題）" />
		<input type="number" id="itemPoint" placeholder="ポイント（例：10）" />

		<button onclick="addItemFromUI()">追加</button>

		<p id="errorMessage" style="color: red"></p>

		<h2>項目一覧</h2>

		<div id="itemButtons"></div>

		<h2>アプリ設定</h2>

		<label>
			<input type="checkbox" id="allowNegative" />
			マイナス残高を許可する<br />
		</label>

		<label>
			<input type="checkbox" id="confirmDelete" />
			削除前に確認を表示する
		</label>

		<h2>ユーザー管理</h2>

		<input type="text" id="userName" autocomplete="off" placeholder="名前" />

		<button onclick="addUserFromUI()">追加</button>

		<div id="userList"></div>

		<script src="js/settings.js"></script>
	</body>
</html>
