<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>設定画面</title>
		<link rel="stylesheet" href="css/style.css" />
		<link rel="stylesheet" href="css/settings.css" />
	</head>
	<body>
		<h1>設定画面</h1>

		<a href="index.html">← メイン画面へ戻る</a>

		<hr />

		<h2>項目追加</h2>

		<input type="text" id="itemName" placeholder="項目名（例：タスク完了）" />
		<input type="number" id="itemPoint" placeholder="ポイント（例：10）" />
		<p style="font-size: 12px">※ポイントは半角数字で入力してください</p>

		<button onclick="addItemFromUI()">追加</button>

		<p id="errorMessage" style="color: red"></p>

		<h2>項目一覧</h2>

		<div id="itemButtons" class="settingsItemButtons"></div>

		<h2>アプリ設定</h2>

		<div class="settingCard">
			<div class="settingLeft">目標ポイント機能を使用する</div>

			<div class="settingRight">
				<input type="checkbox" id="useGoalPoint" />
			</div>
		</div>

		<div id="goalSettings" class="settingCardBlock">
			<div class="settingCard">
				<label>
					<input type="radio" name="goalMode" value="personal" checked />
					個人目標
				</label>
			</div>

			<div class="settingCard">
				<label>
					<input type="radio" name="goalMode" value="shared" />
					共有目標
				</label>
			</div>

			<hr />

			<div id="personalGoalSettings" style="display: none"></div>

			<div id="sharedGoalSettings" style="display: none">
				<input
					type="number"
					id="sharedGoalPoint"
					placeholder="共有目標ポイント"
				/>
			</div>
		</div>

		<div class="settingCard">
			<div class="settingLeft">マイナス残高を許可する</div>
			<div class="settingRight">
				<input type="checkbox" id="allowNegative" />
			</div>
		</div>

		<div class="settingCard">
			<div class="settingLeft">削除前に確認を表示する</div>
			<div class="settingRight">
				<input type="checkbox" id="confirmDelete" />
			</div>
		</div>

		<h2>ユーザー管理</h2>

		<input
			type="text"
			id="userName"
			name="userName"
			autocomplete="off"
			placeholder="名前"
		/>

		<button onclick="addUserFromUI()">追加</button>

		<div id="userList"></div>
		<div id="userEmpty"></div>

		<script src="js/settings.js"></script>
	</body>
</html>
